# Follow K8 Documentation 
apiVersion: apps/v1
kind: Deployment

metadata: 
  name: nginx-deployment
  namespace: development
  labels:
    app: nginx

spec:
  replicas: 5

  selector:
    matchLabels:
      app: nginx

  template: #  Blueprint of Pod
    metadata:
      name: nginx-pod
      namespace: development
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80

    